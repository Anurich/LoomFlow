name: Release to PyPI

on:
  push:
    tags:
      - "v*"

# Trusted publishing requires id-token: write at the job level.
# Configure your PyPI project to trust this workflow at:
#   https://pypi.org/manage/account/publishing/

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip build

      - name: Build
        run: python -m build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # required for PyPI trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # Idempotent: a tag for a version that already exists on
          # PyPI (e.g. uploaded manually before automated releases
          # were wired up) becomes a no-op instead of failing the
          # workflow.
          skip-existing: true
        # Trusted publishing — no API token needed. Configure your
        # PyPI project at https://pypi.org/manage/account/publishing/
        # with ``release.yml`` as the workflow file and this job's
        # environment.
