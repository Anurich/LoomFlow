name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel old runs on the same PR / branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          # All extras the test suite needs. ``postgres`` /
          # ``redis`` / ``mcp`` extras install client libs but the
          # matching live tests stay skipped without
          # ``JEEVES_TEST_PG_DSN`` / ``JEEVES_TEST_REDIS_URL``.
          # ``litellm`` / ``voyage`` / ``cohere`` extras let mypy
          # resolve the SDK type hints in the lazy-import paths.
          pip install -e '.[dev,anthropic,openai,otel,chroma,redis,postgres,mcp,litellm,voyage,cohere]'

      - name: Ruff
        run: ruff check jeevesagent tests

      - name: Mypy --strict
        run: mypy --strict jeevesagent

      - name: Pytest
        run: pytest tests/ --tb=short -v

  examples:
    name: examples (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: test
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Run examples
        run: |
          set -e
          for f in examples/0*.py; do
            echo "=== $f ==="
            python "$f"
          done
